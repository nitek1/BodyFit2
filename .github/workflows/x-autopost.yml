name: X Autopost

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only generate the post without publishing"
        required: false
        default: "true"
      force_title:
        description: "Optional custom headline to use instead of fetched trends"
        required: false
        default: ""
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: read

jobs:
  autopost:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      FORCE_TITLE: ${{ github.event.inputs.force_title || '' }}
      POST_PREFIX: Radar tech/IA
      POST_HASHTAGS: "#IA #Tecnologia"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run autopost
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: node automation/x-autopost/run.js
